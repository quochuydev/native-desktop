name: Release

# Push a semver tag to cut a release:
#   git tag v0.2.0 && git push origin v0.2.0
# The job builds and packages the macOS app, publishes a GitHub Release with
# the bundle + a machine-readable manifest, and bumps latest.txt on the
# default branch so installed apps detect the update on their next boot.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"
          # Fail fast if app.zon and the tag disagree — the app would ship a
          # version that does not match the release.
          if ! grep -q "\.version = \"$VERSION\"" app.zon; then
            echo "::error::app.zon .version does not match tag v$VERSION — bump app.zon, src/core.ts and CHANGELOG.md before tagging (see RELEASING.md)"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install the Native SDK CLI
        run: |
          npm install -g @native-sdk/cli
          native version
          # The published CLI ships its TS transpiler package without its
          # installed dependency; materialize it so `native build` can run.
          CORE_DIR="$(npm root -g)/@native-sdk/cli/packages/core"
          if [ -d "$CORE_DIR" ]; then (cd "$CORE_DIR" && npm ci); fi

      - name: Check
        run: native check

      - name: Build (ReleaseFast) and package the macOS app
        run: |
          native build --yes
          native package --target macos --yes

      - name: Zip the .app bundle
        id: pack
        run: |
          APP_PATH="$(find . -maxdepth 4 -name '*.app' -type d | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::no .app bundle produced by native package"
            exit 1
          fi
          echo "Found bundle: $APP_PATH"
          ZIP="native-desktop-macos-v${{ steps.ver.outputs.version }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$ZIP" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Write update manifest (latest.json)
        run: |
          cat > latest.json <<EOF
          {
            "version": "${{ steps.ver.outputs.version }}",
            "notes": "See the release notes for v${{ steps.ver.outputs.version }}.",
            "platform": "macos",
            "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pack.outputs.zip }}",
            "sha256": "${{ steps.pack.outputs.sha256 }}"
          }
          EOF
          cat latest.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.pack.outputs.zip }}" \
            latest.json \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Bump latest.txt on the default branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          printf '%s\n' "${{ steps.ver.outputs.version }}" > latest.txt
          if ! git diff --quiet latest.txt; then
            git commit -am "chore(release): latest.txt -> v${{ steps.ver.outputs.version }}"
            git push origin main
          else
            echo "latest.txt already at v${{ steps.ver.outputs.version }}"
          fi
